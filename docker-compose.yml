services:
  nasiko-document-agent:
    build: .
    container_name: nasiko-document-agent
    environment:
      - OPENAI_API_KEY=
      - PEXELS_API_KEY=
    stdin_open: true
    ports:
      - "5000:5000"
    volumes:
      - ./outputs:/app/outputs   # <-- ADD THESE TWO LINES
    tty: true
    networks:
      - agents-net

networks:
  agents-net:
    external: false